<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroRiego Pro - Registro de Turno</title>
    <style>
        :root {
            --bg-principal: #0b0f19;
            --bg-tarjeta: #131c2e;
            --borde: #233554;
            --azul-link: #38bdf8;
            --verde: #10b981;
            --amarillo: #f59e0b;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-principal); 
            color: #f8fafc; 
            margin: 0; 
            padding: 20px; 
        }
        .contenedor-formulario { 
            max-width: 800px; 
            margin: 40px auto; 
            background-color: var(--bg-tarjeta); 
            border: 1px solid var(--borde); 
            border-radius: 12px; 
            padding: 30px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        h2 { margin-top: 0; font-size: 22px; color: #fff; border-bottom: 1px solid var(--borde); padding-bottom: 15px; }
        
        /* Estructura en dos columnas según el papel */
        .secciones-papel { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 30px; 
            margin-bottom: 25px;
        }
        @media(max-width: 650px) { .secciones-papel { grid-template-columns: 1fr; } }
        
        .columna { display: flex; flex-direction: column; gap: 15px; }
        .columna-titulo { 
            font-size: 14px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            color: var(--azul-link); 
            font-weight: bold;
            border-bottom: 1px dashed var(--borde);
            padding-bottom: 5px;
            margin-bottom: 5px;
        }
        
        .grupo-campo { display: flex; flex-direction: column; }
        label { font-size: 13px; color: #94a3b8; margin-bottom: 6px; font-weight: bold; }
        input, select { 
            background: #0f172a; 
            border: 1px solid var(--borde); 
            padding: 12px; 
            color: white; 
            border-radius: 6px; 
            font-size: 14px; 
            transition: border 0.3s;
        }
        input:focus { border-color: var(--azul-link); outline: none; }
        input[readonly] { background: rgba(35, 53, 84, 0.2); color: #94a3b8; cursor: not-allowed; }
        
        .acciones { 
            display: flex; 
            justify-content: flex-end; 
            gap: 15px; 
            border-top: 1px solid var(--borde); 
            padding-top: 20px; 
        }
        .btn-enviar { background: var(--verde); border: none; color: white; padding: 12px 25px; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 15px; }
        .btn-enviar:hover { background: #059669; }
        .btn-cancelar { background: transparent; border: 1px solid var(--borde); color: #94a3b8; text-align: center; padding: 11px 20px; font-weight: bold; border-radius: 6px; text-decoration: none; font-size: 14px; }
        .btn-cancelar:hover { background: rgba(255,255,255,0.05); color: #fff; }
    </style>
</head>
<body>

    <div class="contenedor-formulario">
        <h2>📝 Libro Hídrico: Separador de Registro de Riego ({{ data.nombre_corto }})</h2>
        
        <form method="POST">
            <div class="secciones-papel">
                
                <div class="columna">
                    <div class="columna-titulo">Datos de Configuración y Objetivos</div>
                    
                    <div class="grupo-campo">
                        <label>Lote / Cobertura asignada</label>
                        <input type="text" value="{{ data.lote }}" readonly>
                    </div>
                    
                    <div class="grupo-campo">
                        <label>Lámina Acumulada del Pivot</label>
                        <input type="text" value="{{ total_acumulado_mm }} mm" readonly style="color: var(--verde); font-weight: bold; font-size: 15px;">
                    </div>

                    <div class="grupo-campo">
                        <label>Lámina Objetivo / Programada (mm)</label>
                        <input type="number" step="0.1" name="lamina_programada" placeholder="Ej: 15.0" required style="border-color: var(--amarillo);">
                    </div>

                    <div class="grupo-campo">
                        <label>Fecha de la Operación</label>
                        <input type="date" name="fecha_riego" value="{{ fecha_hoy }}" required>
                    </div>
                </div>
                
                <div class="columna">
                    <div class="columna-titulo">Lecturas Reales Calculadas / Panel</div>
                    
                    <div class="grupo-campo">
                        <label>Horas de Panel (hs de marcha del equipo)</label>
                        <input type="number" step="0.1" name="horas_panel" placeholder="Ej: 18.5" required style="border-color: var(--azul-link);">
                    </div>

                    <div class="grupo-campo">
                        <label>Horas de Motor Físico (hs aplicadas al service)</label>
                        <input type="number" step="0.1" name="horas_motor" placeholder="Ej: 19.0" required style="border-color: var(--azul-link);">
                    </div>

                    <div class="grupo-campo">
                        <label>Lámina Aplicada Real (mm)</label>
                        <input type="number" step="0.1" name="lamina_mm" placeholder="Ej: 14.8" required style="border-color: var(--verde); font-weight: bold; font-size: 15px;">
                    </div>
                </div>

            </div>

            <div class="acciones">
                <a href="{{ url_for('index', equipo=data.id) }}" class="btn-cancelar">❌ Cancelar y Volver</a>
                <button type="submit" class="btn-enviar">💾 Guardar en Libro Hídrico</button>
            </div>
        </form>
    </div>

</body>
</html>
