<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroRiego Pro - Telemetría Satelital</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            /* RUTA EXACTA que tenés en Render */
            background: url("{{ url_for('static', filename='Center-pivot-irrigation.jpg') }}") center / cover no-repeat fixed;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        /* Capa oscura para que se lea bien el texto */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 1;
        }
        .login-card {
            position: relative;
            z-index: 2;
            background: #ffffff;
            padding: 35px 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            text-align: center;
        }
        .logo {
            width: 55px;
            height: 55px;
            margin: 0 auto 15px;
            background: linear-gradient(135deg, #2ecc71, #3498db);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: white;
        }
        h2 {
            font-size: 20px;
            color: #222;
            margin-bottom: 6px;
        }
        .subtitulo {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 25px;
        }
        .form-group {
            text-align: left;
            margin-bottom: 18px;
        }
        label {
            font-size: 12px;
            color: #444;
            margin-bottom: 6px;
            display: block;
        }
        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #27ae60;
            box-shadow: 0 0 0 2px rgba(39, 174, 96, 0.2);
        }
        .btn-ingresar {
            width: 100%;
            padding: 12px;
            background-color: #27ae60;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-ingresar:hover {
            background-color: #219653;
        }
        .error {
            background: #fdecea;
            color: #c0392b;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">🌱💧</div>
        <h2>AgroRiego Pro</h2>
        <p class="subtitulo">SISTEMA DE TELEMETRÍA SATELITAL</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label>USUARIO</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>CONTRASEÑA</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn-ingresar">Ingresar al Sistema</button>
        </form>
    </div>
</body>
</html>
