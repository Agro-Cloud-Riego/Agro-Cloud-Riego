<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroRiego - Telemetría Satelital</title>
    <style>
        body {
            /* Fondo con imagen real en alta definición de un sistema pivot regando cultivos */
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://images.unsplash.com/photo-1592417817098-8f3d6eb19675?q=80&w=1600') no-repeat center center fixed;
            background-size: cover;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card { 
            background: rgba(255, 255, 255, 0.96); 
            padding: 40px 35px; 
            border-radius: 20px; 
            box-shadow: 0 12px 30px rgba(0,0,0,0.5); 
            width: 360px; 
            text-align: center; 
            box-sizing: border-box; 
        }
        /* Círculo superior con el nuevo ícono de riego */
        .brand-icon { 
            background: #10b981; 
            color: white; 
            width: 70px; 
            height: 70px; 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 32px; 
            margin: 0 auto 15px auto; 
            box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3);
        }
        h2 { margin: 0 0 5px 0; color: #111827; font-size: 26px; font-weight: bold; }
        
        /* Tu frase solicitada abajo de AgroRiego Pro */
        .subtitle { 
            color: #4b5563; 
            font-size: 11px; 
            font-weight: bold;
            margin-bottom: 25px; 
            text-transform: uppercase; 
            letter-spacing: 0.8px;
        }
        
        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; font-size: 11px; font-weight: bold; color: #374151; margin-bottom: 6px; text-transform: uppercase; }
        input { width: 100%; padding: 12px 14px; background: #f3f4f6; border: 1px solid #d1d5db; color: #111827; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        input:focus { outline: none; border-color: #10b981; background: #fff; }
        
        button { width: 100%; padding: 14px; background: #10b981; border: none; border-radius: 8px; font-weight: bold; font-size: 15px; cursor: pointer; color: white; margin-top: 10px; transition: background 0.2s; }
        button:hover { background: #059669; }
        
        .error-msg { color: #dc2626; font-size: 13px; margin-bottom: 15px; background: #fee2e2; padding: 8px; border-radius: 6px; border: 1px solid #fca5a5; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand-icon">🌱💧</div>
        <h2>AgroRiego Pro</h2>
        <div class="subtitle">Sistema de Telemetría Satelital</div>
        
        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}
        
        <form method="POST">
            <div class="input-group">
                <label>Usuario</label>
                <input type="text" name="username" placeholder="Ingresá tu usuario" required>
            </div>
            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit">Ingresar al Sistema</button>
        </form>
    </div>
</body>
</html>
