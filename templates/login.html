<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroRiego - Telemetría Satelital</title>
    <style>
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('https://images.unsplash.com/photo-1622383563227-04401ab4e5ea?q=80&w=1200') no-repeat center center fixed;
            background-size: cover;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card { background: rgba(255, 255, 255, 0.96); padding: 40px 35px; border-radius: 20px; box-shadow: 0 12px 30px rgba(0,0,0,0.4); width: 360px; text-align: center; box-sizing: border-box; }
        .brand-icon { background: #2563eb; color: white; width: 65px; height: 65px; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto 15px; font-size: 32px; }
        h2 { color: #0f172a; margin: 0 0 5px 0; font-size: 28px; font-weight: bold; }
        .subtitle { color: #4b5563; font-size: 14px; margin-bottom: 30px; }
        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; font-size: 11px; font-weight: bold; color: #374151; margin-bottom: 6px; text-transform: uppercase; }
        input { width: 100%; padding: 12px 14px; background: #f3f4f6; border: 1px solid #d1d5db; color: #111827; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 14px; background: #2563eb; border: none; border-radius: 8px; font-weight: bold; font-size: 15px; cursor: pointer; color: white; margin-top: 10px; }
        .error-msg { color: #dc2626; font-size: 13px; margin-bottom: 15px; background: #fee2e2; padding: 8px; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand-icon">💦</div>
        <h2>AgroRiego</h2>
        <div class="subtitle">Sistema de Telemetría Satelital</div>
        {% if error %}<div class="error-msg">{{ error }}</div>{% endif %}
        <form method="POST">
            <div class="input-group">
                <label>Usuario de Acceso</label>
                <input type="text" name="usuario" placeholder="marcelo" required>
            </div>
            <div class="input-group">
                <label>Clave de Seguridad</label>
                <input type="password" name="clave" placeholder="••••••••" required>
            </div>
            <button type="submit">Conectar con Equipos →</button>
        </form>
    </div>
</body>
</html>
