<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroCloud Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn { padding: 15px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-right: 10px; }
        .btn-start { background: #28a745; color: white; }
        .btn-stop { background: #dc3545; color: white; }
    </style>
</head>
<body>
    <h1>AgroCloud - Control de Pivot</h1>
    <div class="grid">
        <div class="card"><h3>Presión</h3><p>{{ data.presion }} Bar</p></div>
        <div class="card"><h3>Ángulo</h3><p>{{ data.angulo }}°</p></div>
        <div class="card"><h3>Estado</h3><p>{{ data.estado }}</p></div>
    </div>
    <div style="margin-top: 20px;">
        <button class="btn btn-start" onclick="enviarComando('ARRANCAR')">ARRANCAR PIVOT</button>
        <button class="btn btn-stop" onclick="enviarComando('PARAR')">DETENER</button>
    </div>

    <script>
        function enviarComando(cmd) {
            fetch('/api/v1/control', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({comando: cmd}) 
            }).then(() => location.reload());
        }
    </script>
</body>
</html>
