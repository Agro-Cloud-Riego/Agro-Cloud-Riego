<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AgroCloud - Panel de Control</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; text-align: center; }
        .card { display: inline-block; padding: 20px; margin: 10px; background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 200px; }
        .value { font-size: 24px; font-weight: bold; color: #2c3e50; }
        .label { color: #7f8c8d; }
    </style>
</head>
<body>
    <h1>AgroCloud - Control de Pivot</h1>
    
    <div class="card">
        <div class="label">Presión</div>
        <div class="value">{{ data.presion }} Bar</div>
    </div>
    
    <div class="card">
        <div class="label">Ángulo</div>
        <div class="value">{{ data.angulo }}°</div>
    </div>
    
    <div class="card">
        <div class="label">Estado</div>
        <div class="value">{{ data.estado }}</div>
    </div>

    <br>
    <button onclick="location.reload()">Actualizar Datos</button>
</body>
</html>
